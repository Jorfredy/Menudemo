<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Demo - Sports Bar</title>
    <style>
        :root { --primary: #e65100; --bg: #f4f6f8; --text: #333; --danger: #e53935; --success: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .sticky-container { position: sticky; top: 0; z-index: 100; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header { text-align: center; padding: 10px 0; position: relative; }
        .logo-header { max-width: 80%; max-height: 80px; display: block; margin: 0 auto; height: auto; }
        .btn-gerente { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.8); border: 1px solid var(--primary); color: var(--primary); padding: 4px 8px; border-radius: 5px; font-size: 0.7em; cursor: pointer; font-weight: bold; }
        
        .indicador-deslizar { text-align: center; font-size: 0.75em; color: #888; padding: 5px 0; background: #fafafa; border-top: 1px solid #eee; font-weight: bold; letter-spacing: 0.5px; animation: parpadeo 2s infinite;}
        @keyframes parpadeo { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        .nav-categorias { display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px; background: white; border-bottom: 1px solid #eee; scroll-behavior: smooth; }
        .nav-categorias::-webkit-scrollbar { display: none; }
        .nav-btn { background: var(--bg); border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-weight: bold; color: #555; cursor: pointer; font-size: 0.85em; transition: 0.2s;}
        .nav-btn:active { background: var(--primary); color: white; border-color: var(--primary); }

        .container { padding: 10px; overflow: hidden; }
        
        .seccion-carrusel { position: relative; margin-top: 15px; margin-bottom: 25px; }
        .titulo-carrusel { color: var(--primary); font-size: 1.2em; text-transform: uppercase; margin-left: 10px; margin-bottom: 10px; border-bottom: 2px solid var(--primary); display: inline-block; font-weight: bold;}
        .carrusel-track { display: flex; overflow-x: auto; gap: 15px; padding: 5px 10px 15px 10px; scroll-behavior: smooth; scroll-snap-type: x mandatory; }
        .carrusel-track::-webkit-scrollbar { display: none; }
        
        .card-carrusel { flex: 0 0 85%; max-width: 320px; background: white; border-radius: 12px; display: flex; flex-direction: column; scroll-snap-align: center; overflow: hidden; position: relative;
            box-shadow: 0 5px 15px rgba(230, 81, 0, 0.15); border: 1px solid rgba(230, 81, 0, 0.2); 
        }
        .card-carrusel.agotado { opacity: 0.6; filter: grayscale(0.8); }
        .img-carrusel { width: 100%; height: 160px; object-fit: contain; background: white; padding: 5px; box-sizing: border-box; cursor: pointer;}
        .info-carrusel { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; border-top: 1px solid #eee;}
        .titulo-carrusel-card { margin: 0; font-size: 1.1em; color: #222; font-weight: bold; cursor: pointer;}
        .desc-carrusel { font-size: 0.85em; color: #666; margin: 8px 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .flecha-btn { position: absolute; top: 45%; transform: translateY(-50%); background: rgba(255,255,255,0.95); border: 1px solid #ddd; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; color: var(--primary); cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; display: flex; justify-content: center; align-items: center; }
        .flecha-izq { left: 0px; }
        .flecha-der { right: 0px; }

        .titulo-categoria { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin: 25px 5px 15px 5px; font-size: 1.2em; text-transform: uppercase; scroll-margin-top: 150px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 5px; }
        
        .platillo-card { background: white; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; position: relative;
            box-shadow: 0 5px 15px rgba(230, 81, 0, 0.15); border: 1px solid rgba(230, 81, 0, 0.2);
        }
        .platillo-card.agotado { opacity: 0.6; filter: grayscale(0.8); }
        .img-contenedor { width: 100%; aspect-ratio: 1 / 1; background: white; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: center; align-items: center; padding: 8px; box-sizing: border-box;}
        .img-contenedor img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px;}
        .info-card { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .titulo-card { margin: 0; font-size: 0.9em; color: #222; font-weight: bold; cursor: pointer; margin-bottom: 8px;}

        .grid-btns { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
        .btn-rapido { background: var(--primary); color: white; border: none; border-radius: 6px; padding: 10px 5px; font-size: 0.85em; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 5px;}
        .btn-rapido:active { transform: scale(0.95); }
        .btn-rapido-agotado { background: #888; color: white; border: none; border-radius: 6px; padding: 10px 5px; font-size: 0.85em; width: 100%; cursor: not-allowed; font-weight: bold;}
        .precio-tachado { text-decoration: line-through; color: rgba(255,255,255,0.7); font-weight: normal; font-size: 0.9em;}

        .badge-sugerencia { background: #ff9800; color: white; font-size: 0.6em; padding: 3px 8px; border-radius: 4px; position: absolute; top: 8px; right: 8px; font-weight: bold; z-index: 1;}
        .badge-oferta { background: var(--danger); color: white; font-size: 0.6em; padding: 3px 8px; border-radius: 4px; position: absolute; top: 8px; left: 8px; font-weight: bold; z-index: 1;}

        .btn-volver-arriba { position: fixed; bottom: 85px; right: 15px; background: rgba(255,255,255,0.9); color: var(--text); width: 45px; height: 45px; border-radius: 50%; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 90; display: none; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);}
        .carrito-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; background: var(--success); color: white; border-radius: 12px; padding: 15px 20px; box-sizing: border-box; display: none; justify-content: space-between; align-items: center; box-shadow: 0 6px 15px rgba(0,0,0,0.3); z-index: 95; cursor: pointer;}
        .carrito-badge { background: white; color: var(--success); font-weight: bold; padding: 2px 8px; border-radius: 15px; font-size: 0.9em; margin-right: 10px; }
        .carrito-texto { font-weight: bold; font-size: 1.1em; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; }
        .modal-detalle { background: white; width: 100%; height: 100%; overflow-y: auto; display: flex; flex-direction: column; }
        .img-detalle-grande { width: 100%; max-height: 40vh; object-fit: contain; background: white; padding: 10px; box-sizing: border-box;}
        .contenido-detalle { padding: 20px; flex-grow: 1; }
        .footer-detalle { padding: 20px; border-top: 1px solid #eee; background: #f9f9f9; }
        
        .modal-carrito-content { background: white; width: 90%; max-width: 400px; max-height: 80vh; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden;}
        .carrito-header { padding: 15px 20px; background: var(--bg); border-bottom: 1px solid #eee; text-align: center; }
        .carrito-header h3 { margin: 0; color: var(--primary); }
        .carrito-lista { padding: 15px 20px; overflow-y: auto; flex-grow: 1; }
        
        .item-carrito { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px dashed #ddd; padding-bottom: 12px;}
        .item-info { flex-grow: 1; padding-right: 10px;}
        .item-carrito-categoria { font-size: 0.7em; color: var(--primary); text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 2px;}
        .item-carrito-nombre { font-weight: bold; font-size: 0.9em; color: #333; }
        .item-carrito-detalle { font-size: 0.8em; color: #777; display: block; margin-top: 2px;}
        .item-controles { display: flex; align-items: center; gap: 8px; }
        .btn-cantidad { background: #eee; border: 1px solid #ccc; border-radius: 6px; width: 28px; height: 28px; font-weight: bold; cursor: pointer; color: var(--text); font-size: 1.1em; display:flex; justify-content:center; align-items:center;}
        .item-precio-total { font-weight: bold; color: var(--primary); min-width: 50px; text-align: right; font-size: 0.95em;}
        
        .carrito-footer { padding: 15px 20px; background: #f9f9f9; border-top: 1px solid #eee; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; color: #222; margin-bottom: 10px; }
        .propina-row { text-align: right; font-size: 0.85em; color: #666; margin-bottom: 15px; line-height: 1.5; }
        .propina-monto { color: #222; font-weight: bold; }
        
        .btn-grande { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: center; gap: 8px; align-items: center;}
        .btn-regresar { width: 100%; background: #eee; color: #555; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-vaciar { width: 100%; background: none; color: var(--danger); padding: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="sticky-container">
        <header>
            <button class="btn-gerente" onclick="abrirLogin()">Gerente</button>
            <img src="temporal.jpg" alt="Logo" class="logo-header">
        </header>
        <div class="indicador-deslizar">👈 DESLIZA PARA VER MÁS CATEGORÍAS 👉</div>
        <div class="nav-categorias" id="nav-container"></div>
    </div>

    <div class="container" id="menu-container"></div>

    <button class="btn-volver-arriba" id="btn-arriba" onclick="subirArriba()">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <div class="carrito-bar" id="carrito-bar" onclick="abrirModalCarrito()">
        <div>
            <span class="carrito-badge" id="bar-cantidad">0</span>
            <span class="carrito-texto">Ver orden</span>
        </div>
        <span class="carrito-texto" id="bar-total">$0</span>
    </div>

    <div class="modal-overlay" id="modal-carrito" style="align-items: flex-end; padding-bottom: 15px;">
        <div class="modal-carrito-content">
            <div class="carrito-header"><h3>Tu Orden</h3></div>
            <div class="carrito-lista" id="lista-items-carrito"></div>
            <div class="carrito-footer">
                <div class="total-row"><span>Total:</span><span id="total-carrito-texto">$0</span></div>
                <div class="propina-row">
                    Propina sugerida (10%): <span class="propina-monto" id="propina-10">$0</span><br>
                    Propina ideal (15%): <span class="propina-monto" id="propina-15">$0</span>
                </div>
                <button class="btn-grande" onclick="cerrarModalCarrito()">Seguir viendo menú</button>
                <button class="btn-vaciar" onclick="vaciarCarrito()">🗑️ Vaciar toda la orden</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-detalle" style="align-items: flex-start; z-index:250;">
        <div class="modal-detalle">
            <img src="" id="det-foto" class="img-detalle-grande" onerror="manejarErrorImagen(this, '')">
            <div class="contenido-detalle">
                <h2 id="det-titulo" style="margin:0; font-size:1.5em;">Nombre</h2>
                <p id="det-desc" style="color: #666; line-height: 1.5; margin-top:10px;">Descripción...</p>
                <div id="det-botones-container" style="margin-top:20px;"></div>
            </div>
            <div class="footer-detalle">
                <button class="btn-regresar" onclick="cerrarDetalle()">← Regresar al menú</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-login" style="z-index:300;">
        <div style="background:white; width:85%; max-width:350px; padding:20px; border-radius:12px; text-align:center;">
            <h3 style="margin-top:0; color:var(--primary);">Acceso Administrativo</h3>
            <input type="email" id="login-email" placeholder="Correo" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
            <input type="password" id="login-password" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;">
            <button class="btn-grande" id="btn-iniciar-sesion" style="margin-bottom:5px;">Ingresar</button>
            <button class="btn-regresar" onclick="cerrarLogin()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAc_eCxcvIJKFclNMApr9_fVDCDLShTLK8",
            authDomain: "menu-pho88-demo.firebaseapp.com",
            projectId: "menu-pho88-demo",
            storageBucket: "menu-pho88-demo.firebasestorage.app",
            messagingSenderId: "100888777359",
            appId: "1:100888777359:web:5f2946bebba884858216fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ordenDeseado = ["Hamburguesa", "Wings & Boneless", "Nachos", "Papas", "Quesadillas", "Hot Dog", "Burrito", "Ensaladas", "Pechuga de Pollo", "Botanas", "Bebidas", "Coctelería", "Shots", "Botellas"];
        
        let carrito = [];
        const TIEMPO_CADUCIDAD = 2 * 60 * 60 * 1000; 

        window.obtenerFotoCategoria = (categoria) => {
            if (!categoria) return 'temporal.jpg'; 
            const cat = categoria.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            
            if (cat.includes('hamburguesa')) return 'fotos/hamburguesa.jpg';
            if (cat.includes('wing') || cat.includes('boneless') || cat.includes('alita')) return 'fotos/alitas.jpg';
            if (cat.includes('nacho')) return 'fotos/nachos.jpg';
            if (cat.includes('papa') || cat.includes('fries')) return 'fotos/papas.jpg';
            if (cat.includes('quesadilla')) return 'fotos/quesadillas.jpg';
            if (cat.includes('hot dog') || cat.includes('hotdog')) return 'fotos/hotdog.jpg';
            if (cat.includes('burrito')) return 'fotos/burrito.jpg';
            if (cat.includes('ensalada')) return 'fotos/ensaladas.jpg';
            if (cat.includes('pechuga')) return 'fotos/pollof.jpg';
            if (cat.includes('botana')) return 'fotos/botanas.jpg';
            
            if (cat.includes('coctel') || cat.includes('cocteleria')) return 'fotos/cocteles.jpg';
            if (cat.includes('shot')) return 'fotos/shots.jpg';
            if (cat.includes('botella')) return 'fotos/botellas.jpg';
            if (cat.includes('bebida')) return 'fotos/bebidas.jpg';
            
            return 'temporal.jpg'; 
        }

        window.manejarErrorImagen = (imgElement, categoria) => {
            let fallback = window.obtenerFotoCategoria(categoria);
            if (!imgElement.src.includes(fallback) && !imgElement.src.includes('temporal.jpg')) {
                imgElement.src = fallback;
            } else if (!imgElement.src.includes('temporal.jpg')) {
                imgElement.src = 'temporal.jpg';
            }
        }

        function guardarCarritoEnMemoria() {
            localStorage.setItem('kboom_carrito', JSON.stringify(carrito));
            localStorage.setItem('kboom_tiempo', Date.now().toString());
        }

        function cargarCarritoGuardado() {
            const carritoGuardado = localStorage.getItem('kboom_carrito');
            const tiempoGuardado = localStorage.getItem('kboom_tiempo');
            if (carritoGuardado && tiempoGuardado) {
                const tiempoPasado = Date.now() - parseInt(tiempoGuardado);
                if (tiempoPasado < TIEMPO_CADUCIDAD) { carrito = JSON.parse(carritoGuardado); actualizarCarritoUI(); } 
                else { localStorage.removeItem('kboom_carrito'); localStorage.removeItem('kboom_tiempo'); }
            }
        }

        window.agregarAlCarrito = (nombre, tamaño, precioUnitario, categoria) => {
            let indexExistente = carrito.findIndex(i => i.nombre === nombre && i.tamaño === tamaño && parseFloat(i.precioUnitario) === parseFloat(precioUnitario) && i.categoria === categoria);
            if (indexExistente !== -1) carrito[indexExistente].cantidad += 1;
            else carrito.push({ nombre, tamaño, precioUnitario, cantidad: 1, categoria });
            actualizarCarritoUI(); guardarCarritoEnMemoria();
        }

        window.cambiarCantidad = (index, delta) => {
            carrito[index].cantidad += delta;
            if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
            actualizarCarritoUI(); guardarCarritoEnMemoria();
        }

        window.accionRapida = (e, nombre, tamaño, precio, categoria) => { 
            e.stopPropagation(); agregarAlCarrito(nombre, tamaño, precio, categoria);
        }

        function actualizarCarritoUI() {
            const bar = document.getElementById('carrito-bar');
            if (carrito.length === 0) { 
                bar.style.display = 'none'; document.getElementById('modal-carrito').style.display = 'none'; document.body.style.overflow = ''; return; 
            }
            bar.style.display = 'flex';
            let total = 0; let totalItems = 0; let htmlLista = '';
            
            carrito.forEach((item, index) => {
                let subtotal = parseFloat(item.precioUnitario) * item.cantidad;
                total += subtotal; totalItems += item.cantidad;
                let txtCategoria = item.categoria ? `<span class="item-carrito-categoria">${item.categoria}</span>` : '';
                let txtTamaño = item.tamaño ? `<span class="item-carrito-detalle">Tamaño: ${item.tamaño}</span>` : '';
                
                htmlLista += `
                    <div class="item-carrito">
                        <div class="item-info">
                            ${txtCategoria}
                            <div class="item-carrito-nombre">${item.nombre}</div>
                            ${txtTamaño}
                        </div>
                        <div class="item-controles">
                            <button class="btn-cantidad" onclick="cambiarCantidad(${index}, -1)">-</button>
                            <span style="font-weight:bold; font-size:1em; width:15px; text-align:center;">${item.cantidad}</span>
                            <button class="btn-cantidad" onclick="cambiarCantidad(${index}, 1)">+</button>
                            <div class="item-precio-total">$${subtotal}</div>
                        </div>
                    </div>`;
            });

            document.getElementById('bar-cantidad').innerText = totalItems;
            document.getElementById('bar-total').innerText = `$${total}`;
            document.getElementById('lista-items-carrito').innerHTML = htmlLista;
            document.getElementById('total-carrito-texto').innerText = `$${total}`;
            document.getElementById('propina-10').innerText = `$${(total * 0.10).toFixed(2)}`;
            document.getElementById('propina-15').innerText = `$${(total * 0.15).toFixed(2)}`;
        }

        // --- BLOQUEAR SCROLL DE FONDO EN MODALES CLIENTE ---
        window.abrirModalCarrito = () => {
            document.getElementById('modal-carrito').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };
        window.cerrarModalCarrito = () => {
            document.getElementById('modal-carrito').style.display = 'none';
            document.body.style.overflow = '';
        };
        
        window.vaciarCarrito = () => { if(confirm('¿Vaciar orden?')) { carrito = []; actualizarCarritoUI(); guardarCarritoEnMemoria(); } }
        
        window.irACategoria = (id) => {
            const elemento = document.getElementById(id);
            if(elemento) {
                const headerOffset = 140; 
                const elementPosition = elemento.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
        }
        
        window.moverCarrusel = (id, direccion) => {
            const track = document.getElementById(id);
            const scrollAmount = 280; 
            if(direccion === 'der') track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            else track.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
        }

        const textoSeguro = (txt) => txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]/g, '');

        async function cargarMenu() {
            const contenedor = document.getElementById('menu-container');
            const navContainer = document.getElementById('nav-container');
            try {
                const querySnapshot = await getDocs(collection(db, "platillos"));
                const todosLosPlatillos = []; const menuAgrupado = {};
                
                querySnapshot.forEach((doc) => {
                    let p = doc.data(); p.id = doc.id; todosLosPlatillos.push(p);
                    let catOriginal = (p.categoria || 'Extras').trim();
                    let catMatch = ordenDeseado.find(c => textoSeguro(c) === textoSeguro(catOriginal));
                    let catNormalizada = catMatch ? catMatch : catOriginal;

                    if (!menuAgrupado[catNormalizada]) menuAgrupado[catNormalizada] = [];
                    menuAgrupado[catNormalizada].push(p);
                });

                let htmlFinal = ''; let navHtml = '';
                const destacados = todosLosPlatillos.filter(p => p.destacado === true);
                if(destacados.length > 0) {
                    htmlFinal += `<div class="seccion-carrusel"><h2 class="titulo-carrusel">⭐ Especialidad de la casa</h2><button class="flecha-btn flecha-izq" onclick="moverCarrusel('track-destacados', 'izq')">❮</button><div class="carrusel-track" id="track-destacados">`;
                    destacados.forEach(p => htmlFinal += generarTarjetaCarrusel(p));
                    htmlFinal += `</div><button class="flecha-btn flecha-der" onclick="moverCarrusel('track-destacados', 'der')">❯</button></div>`;
                }

                const ofertas = todosLosPlatillos.filter(p => (p.ofertaChico && String(p.ofertaChico).trim() !== "") || (p.ofertaGrande && String(p.ofertaGrande).trim() !== "") || (p.oferta && String(p.oferta).trim() !== ""));
                if(ofertas.length > 0) {
                    htmlFinal += `<div class="seccion-carrusel"><h2 class="titulo-carrusel">🔥 Ofertas del Día</h2><button class="flecha-btn flecha-izq" onclick="moverCarrusel('track-ofertas', 'izq')">❮</button><div class="carrusel-track" id="track-ofertas">`;
                    ofertas.forEach(p => htmlFinal += generarTarjetaCarrusel(p, true));
                    htmlFinal += `</div><button class="flecha-btn flecha-der" onclick="moverCarrusel('track-ofertas', 'der')">❯</button></div>`;
                }

                const categoriasMostradas = new Set();
                const generarSeccionGrid = (cat) => {
                    if (!menuAgrupado[cat] || menuAgrupado[cat].length === 0) return;
                    menuAgrupado[cat].sort((a, b) => {
                        const obtenerMejorPrecio = (p) => {
                            let precios = [];
                            if (p.ofertaChico) precios.push(parseFloat(p.ofertaChico)); else if (p.precioChico) precios.push(parseFloat(p.precioChico));
                            if (p.ofertaGrande) precios.push(parseFloat(p.ofertaGrande)); else if (p.precioGrande) precios.push(parseFloat(p.precioGrande));
                            if (p.oferta) precios.push(parseFloat(p.oferta)); else if (p.precio) precios.push(parseFloat(p.precio));
                            return precios.length > 0 ? Math.min(...precios) : 99999; 
                        };
                        return obtenerMejorPrecio(a) - obtenerMejorPrecio(b);
                    });

                    let catId = "cat-" + textoSeguro(cat);
                    navHtml += `<button class="nav-btn" onclick="irACategoria('${catId}')">${cat}</button>`;
                    htmlFinal += `<h2 id="${catId}" class="titulo-categoria">${cat}</h2><div class="menu-grid">`;
                    
                    menuAgrupado[cat].forEach(p => {
                        let agotadoClase = p.agotado ? 'agotado' : '';
                        let nombreSeguro = p.nombre.replace(/'/g, "\\'");
                        let catSegura = (p.categoria || 'Extra').replace(/'/g, "\\'");
                        let btnsRapidos = generarBotonesApilados(p, nombreSeguro, catSegura);

                        htmlFinal += `
                            <div class="platillo-card ${agotadoClase}" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                                <div class="img-contenedor"><img src="fotos/${p.rutaFoto}" onerror="manejarErrorImagen(this, '${catSegura}')"></div>
                                <div class="info-card">
                                    <p class="titulo-card">${p.nombre}</p>
                                    <div class="grid-btns">${btnsRapidos}</div>
                                </div>
                            </div>
                        `;
                    });
                    htmlFinal += `</div>`; categoriasMostradas.add(cat);
                };

                ordenDeseado.forEach(cat => generarSeccionGrid(cat));
                for (const cat in menuAgrupado) { if (!categoriasMostradas.has(cat)) generarSeccionGrid(cat); }
                navContainer.innerHTML = navHtml; contenedor.innerHTML = htmlFinal;

            } catch (e) { console.error(e); }
        }

        function generarTarjetaCarrusel(p) {
            let nombreSeguro = p.nombre.replace(/'/g, "\\'");
            let catSegura = (p.categoria || 'Extra').replace(/'/g, "\\'");
            let agotadoClase = p.agotado ? 'agotado' : '';
            let badge = (p.ofertaChico || p.ofertaGrande || p.oferta) ? `<span class="badge-oferta">OFERTA</span>` : '';
            let btnsRapidos = generarBotonesApilados(p, nombreSeguro, catSegura);

            return `
                <div class="card-carrusel ${agotadoClase}" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    ${badge}
                    <img src="fotos/${p.rutaFoto}" class="img-carrusel" onerror="manejarErrorImagen(this, '${catSegura}')">
                    <div class="info-carrusel">
                        <p class="titulo-carrusel-card">${p.nombre}</p>
                        <p class="desc-carrusel">${p.descripcion || ''}</p>
                        <div class="grid-btns">${btnsRapidos}</div>
                    </div>
                </div>
            `;
        }

        function generarBotonesApilados(p, nombreSeguro, catSegura) {
            if(p.agotado) return `<button class="btn-rapido-agotado">AGOTADO</button>`;
            let htmlBotones = '';
            if(p.precioChico) {
                let pFinal = p.ofertaChico ? p.ofertaChico : p.precioChico;
                let txt = p.ofertaChico ? `Chico <span class="precio-tachado">$${p.precioChico}</span> $${p.ofertaChico}` : `Chico $${p.precioChico}`;
                htmlBotones += `<button class="btn-rapido" onclick="accionRapida(event, '${nombreSeguro}', 'Chico', ${pFinal}, '${catSegura}')">${txt}</button>`;
            }
            if(p.precioGrande) {
                let pFinal = p.ofertaGrande ? p.ofertaGrande : p.precioGrande;
                let txt = p.ofertaGrande ? `Grande <span class="precio-tachado">$${p.precioGrande}</span> $${p.ofertaGrande}` : `Grande $${p.precioGrande}`;
                htmlBotones += `<button class="btn-rapido" onclick="accionRapida(event, '${nombreSeguro}', 'Grande', ${pFinal}, '${catSegura}')">${txt}</button>`;
            }
            if(!p.precioChico && !p.precioGrande) {
                let pNormal = p.precio || 0; let pFinal = p.oferta || pNormal;
                let txt = p.oferta ? `<span class="precio-tachado">$${pNormal}</span> $${p.oferta}` : `Añadir $${pNormal}`;
                htmlBotones += `<button class="btn-rapido" onclick="accionRapida(event, '${nombreSeguro}', '', ${pFinal}, '${catSegura}')">${txt}</button>`;
            }
            return htmlBotones;
        }

        window.onscroll = function() {
            const btn = document.getElementById('btn-arriba');
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) btn.style.display = "flex";
            else btn.style.display = "none";
        };
        window.subirArriba = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        window.abrirDetalle = (p) => {
            let catSegura = (p.categoria || 'Extra').replace(/'/g, "\\'");
            const imgDetalle = document.getElementById('det-foto');
            imgDetalle.src = `fotos/${p.rutaFoto}`;
            imgDetalle.onerror = function() { window.manejarErrorImagen(this, catSegura); };
            
            document.getElementById('det-titulo').innerText = p.nombre;
            document.getElementById('det-desc').innerText = p.descripcion || 'Sin descripción disponible.';
            const btnCont = document.getElementById('det-botones-container'); btnCont.innerHTML = '';
            
            let nombreSeguro = p.nombre.replace(/'/g, "\\'");

            if(p.agotado) { btnCont.innerHTML = '<p style="color:red; font-weight:bold; text-align:center; font-size:1.2em;">AGOTADO</p>'; } 
            else {
                if(p.precioChico) {
                    let pFinal = p.ofertaChico || p.precioChico;
                    let txt = p.ofertaChico ? `Pedir Chico (<span class="precio-tachado" style="color:rgba(255,255,255,0.7)">$${p.precioChico}</span> $${p.ofertaChico})` : `Pedir Chico ($${p.precioChico})`;
                    btnCont.innerHTML += `<button class="btn-grande" onclick="agregarAlCarrito('${nombreSeguro}', 'Chico', ${pFinal}, '${catSegura}'); cerrarDetalle();">${txt}</button>`;
                }
                if(p.precioGrande) {
                    let pFinal = p.ofertaGrande || p.precioGrande;
                    let txt = p.ofertaGrande ? `Pedir Grande (<span class="precio-tachado" style="color:rgba(255,255,255,0.7)">$${p.precioGrande}</span> $${p.ofertaGrande})` : `Pedir Grande ($${p.precioGrande})`;
                    btnCont.innerHTML += `<button class="btn-grande" onclick="agregarAlCarrito('${nombreSeguro}', 'Grande', ${pFinal}, '${catSegura}'); cerrarDetalle();">${txt}</button>`;
                }
                if(!p.precioChico && !p.precioGrande) {
                    let pNormal = p.precio || 0; let pFinal = p.oferta || pNormal;
                    let txt = p.oferta ? `Agregar Orden (<span class="precio-tachado" style="color:rgba(255,255,255,0.7)">$${pNormal}</span> $${pFinal})` : `Agregar a la orden ($${pFinal})`;
                    btnCont.innerHTML += `<button class="btn-grande" onclick="agregarAlCarrito('${nombreSeguro}', '', ${pFinal}, '${catSegura}'); cerrarDetalle();">${txt}</button>`;
                }
            }
            document.getElementById('modal-detalle').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Bloquear scroll
        }

        window.cerrarDetalle = () => {
            document.getElementById('modal-detalle').style.display = 'none';
            document.body.style.overflow = ''; // Restaurar scroll
        };
        
        window.abrirLogin = () => {
            document.getElementById('modal-login').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };
        window.cerrarLogin = () => {
            document.getElementById('modal-login').style.display = 'none';
            document.body.style.overflow = '';
        };

        document.getElementById('btn-iniciar-sesion').onclick = () => {
            const email = document.getElementById('login-email').value; const pass = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, pass).then(() => window.location.href = 'administrador.html').catch(() => alert("Error"));
        };

        cargarCarritoGuardado(); cargarMenu();
    </script>
</body>
</html>
